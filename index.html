<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Andrea!</title>
    <style>
        :root {
            --cake-color: #f191ba;
            --icing-color: #ffffff;
            --candle-color: #61d4f3;
            --flame-color: #ffda31;
        }

        body {
            /* Aquí está la imagen de fondo. Puedes cambiar la URL por otra o por un archivo local si quieres */
            background: #222 url('https://w0.peakpx.com/wallpaper/434/405/HD-wallpaper-birthday-background-with-balloons-gifts-and-confetti-blue-party-background-birthday-party-concepts.jpg') no-repeat center center fixed;
            background-size: cover;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 50px;
            text-align: center;
            transition: all 0.5s ease;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* Sombra para que siempre se lea bien */
            animation: parpadeo 1.5s infinite; /* Animación de parpadeo */
        }

        /* Esta es la animación de parpadeo */
        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Contenedor del Pastel */
        .cake-container {
            position: relative;
            cursor: pointer;
            z-index: 5;
        }

        .cake {
            position: relative;
            width: 200px;
            height: 120px;
        }

        .plate {
            position: absolute;
            bottom: -10px;
            left: -25px;
            width: 250px;
            height: 20px;
            background: #444;
            border-radius: 50%;
        }

        .layer {
            position: absolute;
            width: 200px;
            border-radius: 10px 10px 0 0;
        }

        .layer-bottom { height: 40px; bottom: 0; background: #8d5524; }
        .layer-middle { height: 40px; bottom: 30px; background: var(--cake-color); }
        .layer-top { height: 40px; bottom: 60px; background: var(--cake-color); }

        .icing {
            position: absolute;
            top: 25px;
            width: 200px;
            height: 25px;
            background: var(--icing-color);
            border-radius: 10px 10px 0 0;
            z-index: 2;
        }

        /* Vela (Ahora centrada correctamente) */
        .candle {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        .wax {
            width: 12px;
            height: 50px;
            background: var(--candle-color);
            border-radius: 3px;
        }

        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 22px;
            background: var(--flame-color);
            border-radius: 50% 50% 35% 35%;
            box-shadow: 0 0 15px rgba(255, 218, 49, 0.7);
            animation: flicker 0.1s ease-in infinite alternate;
        }

        .flame.off {
            display: none;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
        }

        /* Botón de inicio */
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff477e;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #start-btn:hover { background: #ff7096; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <button id="start-btn">Encender Vela 🎂</button>

    <div id="game-content" class="hidden">
        <h1 id="mensaje">¡Acércate al micro y sopla fuerte!</h1>
        
        <div class="cake-container">
            <div class="cake">
                <div class="plate"></div>
                <div class="layer layer-bottom"></div>
                <div class="layer layer-middle"></div>
                <div class="layer layer-top"></div>
                <div class="icing"></div>

                <div class="candle">
                    <div class="flame" id="flame"></div>
                    <div class="wax"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const startBtn = document.getElementById('start-btn');
        const gameContent = document.getElementById('game-content');
        const flame = document.getElementById('flame');
        const mensaje = document.getElementById('mensaje');
        let audioContext;
        let lluviaConfetiInterval;

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            gameContent.classList.remove('hidden');
            
            // Iniciar el confeti continuo de fondo
            iniciarConfetiContinuo();
            
            // Iniciar micrófono
            initAudio();
        });

        // Función para que caiga confeti siempre desde arriba
        function iniciarConfetiContinuo() {
            lluviaConfetiInterval = setInterval(() => {
                confetti({
                    particleCount: 5,
                    angle: 90,
                    spread: 100,
                    origin: { y: -0.1, x: Math.random() }, // Cae desde arriba en posiciones aleatorias
                    ticks: 300,
                    gravity: 0.6,
                    zIndex: 0 // Atrás del pastel
                });
            }, 250);
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext();
                const analyzer = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                
                analyzer.fftSize = 512;
                const bufferLength = analyzer.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                microphone.connect(analyzer);

                function detectBlow() {
                    analyzer.getByteFrequencyData(dataArray);
                    
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    let average = sum / bufferLength;

                    // Umbral ajustado a 15 para que sea sensible
                    if (average > 50) { 
                        extinguish();
                    } else {
                        requestAnimationFrame(detectBlow);
                    }
                }

                detectBlow();
            } catch (err) {
                alert("Para que funcione, necesito permiso para usar el micrófono.");
                console.error(err);
            }
        }

        function extinguish() {
            // Apagar la vela
            flame.classList.add('off');
            
            // Cambiar el mensaje para Andrea
            mensaje.innerText = "¡FELIZ CUMPLEAÑOS ANDREA! 🎉 TE QUIERO MUCHO";
            mensaje.style.color = "#c153fc"; // Letras doradas/amarillas para resaltar
            mensaje.style.fontSize = "3rem";
            
            // Hacer que el parpadeo sea un poco más rápido por la emoción
            mensaje.style.animation = "parpadeo 0.8s infinite"; 
            
            // Apagar el micrófono para ahorrar recursos
            if (audioContext) {
                audioContext.close();
            }
            
            // Gran explosión de confeti desde el pastel
            confetti({
                particleCount: 250,
                spread: 120,
                origin: { y: 0.6 },
                zIndex: 10 // Al frente de todo
            });
            
            // Otra explosión un segundo después
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.5 },
                    zIndex: 10
                });
            }, 500);
        }
    </script>
</body>
</html>
