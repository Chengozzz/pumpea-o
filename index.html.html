<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <style>
        :root {
            --cake-color: #f191ba;
            --icing-color: #ffffff;
            --candle-color: #61d4f3;
            --flame-color: #ffda31;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 50px;
            text-align: center;
            transition: all 0.5s ease;
        }

        /* Contenedor del Pastel */
        .cake-container {
            position: relative;
            cursor: pointer;
        }

        .cake {
            position: relative;
            width: 200px;
            height: 120px;
        }

        .plate {
            position: absolute;
            bottom: -10px;
            left: -25px;
            width: 250px;
            height: 20px;
            background: #444;
            border-radius: 50%;
        }

        .layer {
            position: absolute;
            width: 200px;
            border-radius: 10px 10px 0 0;
        }

        .layer-bottom { height: 40px; bottom: 0; background: #8d5524; }
        .layer-middle { height: 40px; bottom: 30px; background: var(--cake-color); }
        .layer-top { height: 40px; bottom: 60px; background: var(--cake-color); }

        .icing {
            position: absolute;
            top: 25px;
            width: 200px;
            height: 25px;
            background: var(--icing-color);
            border-radius: 10px 10px 0 0;
            z-index: 2;
        }

        /* Vela */
        .candle {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        .wax {
            width: 12px;
            height: 50px;
            background: var(--candle-color);
            border-radius: 3px;
        }

        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 22px;
            background: var(--flame-color);
            border-radius: 50% 50% 35% 35%;
            box-shadow: 0 0 15px rgba(255, 218, 49, 0.7);
            animation: flicker 0.1s ease-in infinite alternate;
        }

        .flame.off {
            display: none;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
        }

        /* Botón de inicio */
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff477e;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #start-btn:hover { background: #ff7096; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <button id="start-btn">Encender Vela 🎂</button>

    <div id="game-content" class="hidden">
        <h1 id="mensaje">¡Acércate al micro y sopla fuerte!</h1>
        
        <div class="cake-container">
            <div class="cake">
                <div class="plate"></div>
                <div class="layer layer-bottom"></div>
                <div class="layer layer-middle"></div>
                <div class="layer layer-top"></div>
                <div class="icing"></div>
            </div>

            <div class="candle">
                <div class="flame" id="flame"></div>
                <div class="wax"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const startBtn = document.getElementById('start-btn');
        const gameContent = document.getElementById('game-content');
        const flame = document.getElementById('flame');
        const mensaje = document.getElementById('mensaje');

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            gameContent.classList.remove('hidden');
            initAudio();
        });

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext();
                const analyzer = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                
                analyzer.fftSize = 512;
                const bufferLength = analyzer.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                microphone.connect(analyzer);

                function detectBlow() {
                    analyzer.getByteFrequencyData(dataArray);
                    
                    // Calculamos el volumen promedio
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    let average = sum / bufferLength;

                    // Umbral de sensibilidad (ajústalo si es necesario)
                    if (average > 50) { 
                        extinguish();
                    } else {
                        requestAnimationFrame(detectBlow);
                    }
                }

                detectBlow();
            } catch (err) {
                alert("Para que funcione, necesito permiso para usar el micrófono.");
                console.error(err);
            }
        }

        function extinguish() {
            flame.classList.add('off');
            mensaje.innerText = "¡FELIZ CUMPLEAÑOS! 🎉";
            mensaje.style.color = "#ff477e";
            mensaje.style.fontSize = "3rem";
            
            // Efecto de confeti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
